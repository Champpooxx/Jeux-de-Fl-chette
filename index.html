<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Fléchettes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Jeu de Fléchettes</h1>
        <div id="error-container" class="error-message" role="alert"></div>
        <div class="game-container">
            <canvas id="dartboard" width="800" height="800" aria-label="Cible de fléchettes interactive" role="img"></canvas>
        </div>
        <div class="controls">
            <div id="weapon-selection" role="radiogroup" aria-label="Sélection de l'arme">
                <button class="weapon-button active" data-weapon="dart" role="radio" aria-checked="true">Dart 🎯</button>
                <button class="weapon-button" data-weapon="chainsaw" role="radio" aria-checked="false">Tronçonneuse 🪚</button>
                <button class="weapon-button" data-weapon="pistol" role="radio" aria-checked="false">Pistolet 🔫</button>
                <button class="weapon-button" data-weapon="laser" role="radio" aria-checked="false">Laser 💥</button>
            </div>
            <input type="file" id="uploader" accept="image/*" aria-label="Charger une image de fond">
            <button id="reset-button" aria-label="Réinitialiser la partie et les scores">Nouvelle partie</button>
            <button id="change-image-button" aria-label="Changer l'image de fond de la cible">Changer d'image</button>
        </div>
        <div class="scores" aria-live="polite">
            <h2>Score: <span id="score">0</span></h2>
            <p>Dernier lancer: <span id="last-score">0</span></p>
            <p>Fléchettes lancées: <span id="darts-thrown">0</span></p>
            <p>Précision moyenne: <span id="avg-precision">0</span></p>
            <p>Meilleur score: <span id="high-score">0</span></p>
        </div>
    </div>
    <script src="script.js" type="module"></script>
</body>
</html>
